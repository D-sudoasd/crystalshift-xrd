name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]" -c constraints-py311.txt
      - name: Check resolved dependencies
        run: python -m pip check
      - name: Test
        run: python -m pytest -q
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m basedpyright
      - name: Compile
        run: python -m compileall -q orthoxrd tests app.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: frontend/.bun-version
      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test
      - name: Type check
        run: bun run typecheck
      - name: Build browser component
        run: bun run build
      - name: Verify generated browser component is committed
        run: git diff --exit-code -- ../orthoxrd/_live_component/live-component.js
