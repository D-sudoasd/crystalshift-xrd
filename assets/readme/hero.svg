<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CrystalShift XRD</title>
  <desc id="desc">Theoretical powder XRD workbench for orthorhombic Cmcm 4c with live evolution and schema 2.4 export.</desc>
  <rect width="1200" height="360" rx="26" fill="#071018"/>
  <path d="M0 54H1200M700 0V360" stroke="#152028"/>
  <g transform="translate(56 40)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
