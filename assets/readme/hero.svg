      <polyline points="28,200 70,185 110,160 150,168 190,120 230,105 270,98 310,102 350,95" fill="none" stroke="#5EC8E8" stroke-width="2.4"/>
      <polyline points="28,218 70,208 110,190 150,196 190,155 230,142 270,136 310,140 350,134" fill="none" stroke="#5EC8E8" stroke-width="1.6" opacity="0.55"/>
      <polyline points="28,232 70,226 110,214 150,218 190,185 230,175 270,170 310,174 350,168" fill="none" stroke="#5EC8E8" stroke-width="1.2" opacity="0.3"/>
      <text x="24" y="70" fill="#A8C0CC" font-size="13">y · shuffle · energy</text>
      <text x="24" y="252" fill="#4A6878" font-size="11">2θ · q · d · exact precomputed frames</text>
