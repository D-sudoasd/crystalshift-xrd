    </g>
    <text y="268" fill="#4A6878" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">v2.3.0 · Streamlit · not Rietveld · not abs. calibration</text>
  </g>
  <g transform="translate(740 48)">
    <rect width="400" height="264" fill="#0A141C" stroke="#1E3040"/>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
