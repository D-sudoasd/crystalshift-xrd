<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">CrystalShift XRD</title>
  <desc id="desc">Streamlit workbench for theoretical powder XRD of orthorhombic Cmcm 4c: lattice, Wyckoff y, shuffle, and energy effects on peaks and F2.</desc>
  <rect width="1200" height="340" rx="28" fill="#0c1220"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="56" y="68" fill="#67e8f9" font-size="18" font-weight="700" letter-spacing="2">Cmcm 4c · THEORETICAL POWDER XRD</text>
    <text x="56" y="124" fill="#f8fafc" font-size="44" font-weight="800">CrystalShift XRD</text>
    <text x="56" y="170" fill="#94a3b8" font-size="20">How a, b, c, y, shuffle, and energy move peaks and F².</text>
    <text x="56" y="212" fill="#64748b" font-size="17">Live evolution · sweeps · discrete-peak fit · schema 2.2 export</text>
    <text x="56" y="260" fill="#fbbf24" font-size="15">Theoretical model · not Rietveld · not absolute calibration</text>
    <text x="56" y="300" fill="#475569" font-size="15">v2.2.0 · Streamlit · port 8508</text>
  </g>
  <g transform="translate(700 48)">
    <rect width="440" height="244" rx="16" fill="#0f172a" stroke="#155e75" stroke-width="2"/>
    <!-- waterfall lines -->
    <polyline points="40,180 100,160 160,140 220,150 280,100 340,90 400,95" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
    <polyline points="40,200 100,185 160,170 220,175 280,130 340,120 400,125" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.7"/>
    <polyline points="40,215 100,205 160,195 220,198 280,160 340,150 400,155" fill="none" stroke="#a5f3fc" stroke-width="1.5" opacity="0.5"/>
    <text x="40" y="50" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="14">y / shuffle / E</text>
    <text x="40" y="80" fill="#e2e8f0" font-family="ui-monospace, monospace" font-size="16">F² evolution · peak tables</text>
    <text x="40" y="240" fill="#64748b" font-family="ui-monospace, monospace" font-size="13">2θ · q · d axes</text>
  </g>
</svg>
